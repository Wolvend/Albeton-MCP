<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Ableton MCP README hero</title>
  <desc id="desc">A bright Ableton-inspired README banner with the Ableton-style mark, hard color blocks, and a Live-like session grid.</desc>
  <defs>
    <pattern id="fineGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#000" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

