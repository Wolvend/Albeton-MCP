    <text x="0" y="82" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Local AI control for Ableton Live, built read-only first.</text>
    <text x="0" y="122" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="18">MCP clients -> TypeScript server -> Max for Live bridge -> LiveAPI</text>
