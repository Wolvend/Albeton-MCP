<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Ableton MCP music agent workflow</title>
  <desc id="desc">A clean Ableton-style workflow diagram for turning a user brief into safe music-production actions.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#000" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1120" height="520" fill="#f7f4ec"/>
  <rect width="1120" height="520" fill="url(#grid)"/>
  <rect x="0" y="0" width="1120" height="16" fill="#000"/>
  <rect x="0" y="504" width="1120" height="16" fill="#000"/>

  <text x="48" y="62" fill="#000" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34" font-weight="900">Golden agent loop</text>
  <text x="48" y="96" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Brief -> concept -> sources -> arrangement -> dry-run -> gated execution.</text>

  <g transform="translate(54 142)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="1012" height="220" fill="#111" stroke="#000" stroke-width="4"/>
    <g stroke="#363636" stroke-width="1">
      <path d="M0 44H1012M0 88H1012M0 132H1012M0 176H1012"/>
      <path d="M144 0V220M288 0V220M432 0V220M576 0V220M720 0V220M864 0V220"/>
    </g>
    <g font-size="13" font-weight="800">
      <text x="14" y="27" fill="#fff">BRIEF</text>
      <text x="158" y="27" fill="#fff">CONCEPT</text>
      <text x="302" y="27" fill="#fff">SOURCES</text>
      <text x="446" y="27" fill="#fff">ARRANGE</text>
      <text x="590" y="27" fill="#fff">DRY RUN</text>
      <text x="734" y="27" fill="#fff">EXECUTE</text>
      <text x="878" y="27" fill="#fff">REVIEW</text>
    </g>
    <rect x="14" y="54" width="116" height="24" fill="#ff764d"/>
    <rect x="158" y="54" width="116" height="24" fill="#b6ffc0"/>
    <rect x="302" y="54" width="116" height="24" fill="#b1c5ff"/>
    <rect x="446" y="54" width="116" height="24" fill="#fbffa7"/>
    <rect x="590" y="54" width="116" height="24" fill="#d5b3ff"/>
    <rect x="734" y="54" width="116" height="24" fill="#0000ff"/>
    <rect x="878" y="54" width="116" height="24" fill="#ff764d"/>
    <rect x="14" y="98" width="116" height="24" fill="#fbffa7"/>
    <rect x="158" y="98" width="116" height="24" fill="#d5b3ff"/>
    <rect x="302" y="98" width="116" height="24" fill="#ff764d"/>
    <rect x="446" y="98" width="116" height="24" fill="#b6ffc0"/>
    <rect x="590" y="98" width="116" height="24" fill="#0000ff"/>
    <rect x="734" y="98" width="116" height="24" fill="#b1c5ff"/>
    <rect x="878" y="98" width="116" height="24" fill="#fbffa7"/>
    <rect x="158" y="142" width="260" height="24" fill="#0000ff"/>
    <rect x="446" y="142" width="260" height="24" fill="#ff764d"/>
    <rect x="734" y="142" width="260" height="24" fill="#b6ffc0"/>
    <rect x="302" y="186" width="260" height="24" fill="#d5b3ff"/>
    <rect x="590" y="186" width="260" height="24" fill="#fbffa7"/>
  </g>

  <g transform="translate(76 400)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="968" height="64" fill="#fff" stroke="#000" stroke-width="4"/>
    <text x="24" y="28" fill="#000" font-size="17" font-weight="900">Rule:</text>
    <text x="78" y="28" fill="#000" font-size="17">If the bridge is unavailable, stay in offline planning.</text>
    <text x="24" y="50" fill="#000" font-size="15">Never claim live Ableton success when a bridge call times out, is unsupported, or needs setup.</text>
  </g>
</svg>
