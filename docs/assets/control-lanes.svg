<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Ableton MCP control lanes</title>
  <desc id="desc">Ableton-style black, white, and color-block diagram showing background LiveAPI and optional foreground UI control.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#000" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1120" height="500" fill="#f7f4ec"/>
  <rect width="1120" height="500" fill="url(#grid)"/>
  <rect x="0" y="0" width="1120" height="16" fill="#000"/>
  <rect x="0" y="484" width="1120" height="16" fill="#000"/>

  <text x="48" y="62" fill="#000" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34" font-weight="900">Two control lanes</text>
  <text x="48" y="96" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Background bridge first. Foreground mouse and keyboard only when the user chooses it.</text>

  <g transform="translate(48 138)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="1024" height="126" fill="#fff" stroke="#000" stroke-width="4"/>
    <rect x="22" y="22" width="170" height="82" fill="#b6ffc0" stroke="#000" stroke-width="3"/>
    <text x="42" y="57" fill="#000" font-size="21" font-weight="900">DEFAULT</text>
    <text x="42" y="83" fill="#000" font-size="14" font-weight="700">background lane</text>
    <path d="M224 63H340" stroke="#000" stroke-width="5"/>
    <path d="M324 48L344 63L324 78" fill="none" stroke="#000" stroke-width="5" stroke-linecap="square"/>
    <text x="374" y="49" fill="#000" font-size="23" font-weight="900">Max for Live LiveAPI bridge</text>
    <text x="374" y="78" fill="#000" font-size="16">Reads snapshots, tracks, scenes, clips, devices, mixer, routing, and dry-run write plans.</text>
    <rect x="374" y="94" width="482" height="22" fill="#000"/>
    <text x="388" y="110" fill="#b6ffc0" font-size="13" font-weight="800">REAL WRITES REQUIRE ABLETON_MCP_ENABLE_WRITE=1 + dry_run=false</text>
  </g>

  <g transform="translate(48 306)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="1024" height="126" fill="#fff" stroke="#000" stroke-width="4"/>
    <rect x="22" y="22" width="170" height="82" fill="#ff764d" stroke="#000" stroke-width="3"/>
    <text x="42" y="57" fill="#000" font-size="21" font-weight="900">OPTIONAL</text>
    <text x="42" y="83" fill="#000" font-size="14" font-weight="700">foreground lane</text>
    <path d="M224 63H340" stroke="#000" stroke-width="5"/>
    <path d="M324 48L344 63L324 78" fill="none" stroke="#000" stroke-width="5" stroke-linecap="square"/>
    <text x="374" y="49" fill="#000" font-size="23" font-weight="900">Ableton UI driver fallback</text>
    <text x="374" y="78" fill="#000" font-size="16">Focus, screenshots, bounded clicks, and text only after explicit consent.</text>
    <rect x="374" y="94" width="456" height="22" fill="#000"/>
    <text x="388" y="110" fill="#fbffa7" font-size="13" font-weight="800">REQUIRES ABLETON_MCP_ENABLE_UI_CONTROL=1 + LOCAL UI DRIVER</text>
  </g>

  <rect x="802" y="34" width="122" height="68" fill="#0000ff"/>
  <rect x="940" y="52" width="88" height="50" fill="#d5b3ff"/>
  <rect x="1012" y="76" width="60" height="34" fill="#fbffa7"/>
</svg>
