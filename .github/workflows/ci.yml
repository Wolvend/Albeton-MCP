name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Build, Test, Lint, MCP Verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install FFmpeg on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: MCP verifier
        run: npm run verify:mcp

      - name: Release check
        run: npm run release:check

  hardening:
    name: Headless Hardening
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Doctor
        run: npm run doctor

      - name: Safe sweep
        run: npm run sweep:safe

      - name: All-tool contract sweep
        run: npm run sweep:all

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Whitespace check
        run: git diff --check
